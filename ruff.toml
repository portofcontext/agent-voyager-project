# Ruff config for the AVP Python workspace.
# Lives next to pyproject.toml at python/. Run from python/ (or via
# `uv --directory python run ruff ...`):
#   ruff check .                # lint
#   ruff check --fix .          # autofix safe issues
#   ruff format .               # apply formatting

target-version = "py311"
line-length = 100
extend-exclude = [".venv", ".pytest_cache"]

[lint]
# Curated ruleset: catch unused imports / unused vars / common bugs / style.
# Keep aggressive rules off (D for docstrings, ANN for annotations) — too noisy for this stage.
select = [
    "F",   # pyflakes (unused imports, unused vars, undefined names)
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "UP",  # pyupgrade (modern Python idioms)
    "B",   # bugbear (likely bugs)
    "SIM", # flake8-simplify
    "C4",  # flake8-comprehensions
    "RUF", # ruff-specific lints
    "PIE", # flake8-pie (misc improvements)
]
ignore = [
    "E501",   # line-too-long — let formatter handle; allow long strings
    "B008",   # function calls in argument defaults (FastAPI/Pydantic patterns)
    "RUF003", # ambiguous unicode in comments — we intentionally use × and em-dashes
    "RUF012", # mutable class attributes (Pydantic models trip this)
    "SIM108", # ternary operator suggestions are sometimes worse for readability
]

[lint.per-file-ignores]
# Tests can have unused fixtures / longer asserts / non-ideal idioms.
"**/tests/**" = ["B011", "SIM", "F841"]
# __init__.py files re-export; F401 is not unused there.
"**/__init__.py" = ["F401"]
# The conformance harness reaches into private attrs by design.
"avp/src/avp/conformance/harness.py" = ["SLF001"]

[lint.isort]
known-first-party = ["avp", "avp_claude_agent_sdk", "avp_cli"]

[format]
quote-style = "double"
indent-style = "space"
