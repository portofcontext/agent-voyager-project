name: Publish to PyPI

# Publishes the single AVP CLI distribution to PyPI via Trusted Publishing
# (OIDC, no stored token). Triggered by a `pypi-v<version>` tag, or run manually
# from the Actions tab.
#
#   avp-cli   the `avp` CLI (console script `avp`), and the ONLY package we
#             publish. It vendors the `avp` wire types and the `avp_conformance`
#             harness into its own wheel (see avp-cli/pyproject.toml's
#             force-include), so `uv tool install avp-cli` is the whole install.
#             The agents themselves are NOT on PyPI: they ship as GitHub releases
#             and are installed into the sandbox by `avp agent install`.
#
# Wheel-only: avp-cli's wheel reaches into sibling workspace dirs to vendor those
# sources, which a package-rooted sdist can't carry, so we build `--wheel`
# directly rather than the default sdist-then-wheel.
#
# ONE-TIME SETUP (before the first publish): on PyPI create the `avp-cli`
# project's Trusted Publisher as a "pending publisher" pointing at this repo +
# this workflow file (`release-pypi.yml`) + environment `pypi`:
#   https://pypi.org/manage/account/publishing/
# After the first successful publish the pending publisher becomes permanent.

on:
  push:
    tags: ["pypi-v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build avp-cli wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: uv build --wheel --package avp-cli --out-dir dist
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
