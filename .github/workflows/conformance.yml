name: Conformance Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# All AVP-conforming implementations must pass the language-agnostic conformance
# suite. This workflow gates that contract on every push and PR.

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: python -m pip install "ruff>=0.6"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  spec-and-conformance:
    name: Spec validation + Python conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # The repo is a uv workspace rooted at the repo root; `uv sync` installs
      # every Python member editable and resolves the cross-package deps (`avp`,
      # `avp-conformance`, ...) to the in-tree sources rather than PyPI. (There's
      # an unrelated `avp` package on PyPI; the workspace sources override it.)
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Sync the workspace
        run: uv sync

      - name: Validate conformance case files against the test-case schema
        run: uv run avp-conformance validate

      - name: Run avp wire-types package tests
        run: cd avp/bindings/python && uv run python -m pytest -v -m "not real_llm"

      - name: Run avp-conformance harness tests (matcher + dispatch seam)
        run: cd avp/core/conformance && uv run python -m pytest -v -m "not real_llm"

      - name: Run avp-claude-agent-sdk translator tests
        run: cd agents/avp-claude-agent-sdk/python && uv run python -m pytest -v -m "not real_llm"

      - name: Run avp-cli tests
        run: cd avp-cli && uv run python -m pytest -v -m "not real_llm"

  real-llm-smoke:
    name: Real-LLM smoke tests (manual only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Manual-trigger only: never auto-fires on push/PR. Burns API credits and exposes
    # the ANTHROPIC_API_KEY secret to the job, so the cost/risk of an automatic run is
    # not justified when mock tests already cover translation logic. Run this on demand
    # (Actions tab → "Conformance Suite" → "Run workflow") after Claude Agent SDK bumps,
    # before releases, or anytime you want to verify against real Claude.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      # The avp-claude-agent-sdk real_llm tests drive the Claude Agent SDK, which
      # shells out to the `claude` CLI; install it so it's on PATH.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install the claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Sync the workspace
        run: uv sync

      - name: Run real-LLM smoke tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not set; configure it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          cd agents/avp-claude-agent-sdk/python && uv run python -m pytest -v -m real_llm
