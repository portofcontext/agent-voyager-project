name: Conformance Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# All AVP-conforming implementations must pass the language-agnostic conformance
# suite. This workflow gates that contract on every push and PR.

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: python -m pip install "ruff>=0.6"
      - name: ruff check
        run: |
          cd python
          ruff check .
      - name: ruff format --check
        run: |
          cd python
          ruff format --check .

  spec-and-conformance:
    name: Spec validation + Python conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install AVP packages (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e './python/avp[dev]'
          pip install -e './python/sdks/avp-anthropic[dev]' --no-deps
          pip install -e './python/agents/avp-claude-agent[dev]' --no-deps
          pip install -e './python/supervisors/simple-supervisor-example[dev]' --no-deps
          # Real upstream SDKs are pulled separately so the package installs
          # don't block on Anthropic / Claude Agent SDK availability:
          pip install "anthropic>=0.40,<1" || echo "anthropic SDK install skipped"
          # claude-agent-sdk may not be available on all Python versions; tolerate skip.
          pip install "claude-agent-sdk>=0.1" || echo "claude-agent-sdk install skipped (translator tests will still run)"

      - name: Validate conformance case files against test-case schema
        run: avp-conformance validate

      - name: Check every event type has conformance coverage
        run: avp-conformance check-coverage

      - name: Run avp package tests (full conformance suite)
        run: |
          cd python/avp
          pytest -v

      - name: Run avp-anthropic SDK adapter tests (mock client only)
        run: |
          cd python/sdks/avp-anthropic
          pytest -v -m "not real_llm"

      - name: Run avp-claude-agent translator tests
        run: |
          cd python/agents/avp-claude-agent
          pytest -v -m "not real_llm"

      - name: Run simple-supervisor-example tests (reference agent CLI smoke)
        run: |
          cd python/supervisors/simple-supervisor-example
          pytest -v -m "not real_llm"

  real-llm-smoke:
    name: Real-LLM smoke tests (manual only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Manual-trigger only: never auto-fires on push/PR. Burns API credits and exposes
    # the ANTHROPIC_API_KEY secret to the job, so the cost/risk of an automatic run is
    # not justified when mock-client tests already cover translation logic. Run this on
    # demand (Actions tab → "Conformance Suite" → "Run workflow") after Anthropic SDK
    # bumps, before releases, or anytime you want to verify against real Claude.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install avp + avp-anthropic
        run: |
          python -m pip install --upgrade pip
          pip install -e './python/avp[dev]'
          pip install -e './python/sdks/avp-anthropic[dev]'

      - name: Run real-LLM smoke tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not set; configure it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          cd python/sdks/avp-anthropic
          pytest -v -m real_llm
