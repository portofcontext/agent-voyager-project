name: Sync model prices

# Keep the bundled price table (the single canonical `prices.json` in
# avp/bindings/python, which the Rust crate embeds via include_str!) tracking
# models.dev, so no one hand-maintains pricing. Runs nightly and commits the
# refreshed table straight to main, but only when the model prices actually
# change (the snapshot date alone never triggers a commit). Also runnable on
# demand from the Actions tab.

on:
  schedule:
    - cron: "17 6 * * *" # daily, 06:17 UTC (off-peak minute per GitHub guidance)
  workflow_dispatch:

permissions:
  contents: write # commit the refreshed table to main

jobs:
  sync:
    name: Sync prices from models.dev
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # `--check` compares only the model prices (not the snapshot date), so this
      # reports drift only on a real price change. It exits non-zero on drift; the
      # if/else keeps the step green either way and records the result.
      - name: Check models.dev for price changes
        id: check
        run: |
          if python avp/scripts/sync-prices.py --check; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write refreshed price table
        if: steps.check.outputs.changed == 'true'
        run: python avp/scripts/sync-prices.py --write

      - name: Commit the refreshed table to main
        if: steps.check.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add avp/bindings/python/src/avp/data/prices.json
          git commit -m "chore: sync model prices from models.dev ($(date -u +%F))"
          git push origin HEAD:main
